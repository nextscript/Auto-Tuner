[mypy]
python_version = 3.10

# Ensure local source files are always found before installed packages.
# Without this, "tuner" (and any other module that shares a name with a
# PyPI package) can be shadowed by the installed wheel when mypy is run
# from a directory that contains a .venv/.
mypy_path = .

# Exclude virtual-environment directories so mypy never recurses into
# site-packages and confuses installed package stubs with local modules.
exclude = (?x)(
    ^\.venv/
  | ^venv/
  | ^env/
  | ^ENV/
  )

# ---------------------------------------------------------------------------
# Per-module overrides for third-party modules that ship without stubs on
# some platforms (Windows-only COM / pywin32; these are guarded by
# try/except ImportError at runtime anyway).
# ---------------------------------------------------------------------------

[mypy-pythoncom]
ignore_missing_imports = True

[mypy-win32com]
ignore_missing_imports = True

[mypy-win32com.*]
ignore_missing_imports = True

# PyQt6 ships its own stubs (PyQt6-stubs); on platforms / runners where
# those stubs aren't installed mypy would otherwise emit import-not-found
# for every Qt import.  The runtime behaviour is unaffected.
[mypy-PyQt6]
ignore_missing_imports = True

[mypy-PyQt6.*]
ignore_missing_imports = True