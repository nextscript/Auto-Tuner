name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format --check
        run: ruff format --check .
        continue-on-error: true   # formatting is advisory, not blocking

  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Ubuntu Qt runtime libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Smoke-import every module
        run: |
          python -c "import auto_tuner, hardware, scanner, settings_loader, tuner, launcher; print('all imports OK')"

      - name: Detect system (must not raise on any runner)
        run: |
          python -c "from hardware import detect_system, format_system; s = detect_system(); print(format_system(s))"

      - name: Validate every YAML profile loads
        run: |
          python -c "from settings_loader import load_profiles; from pathlib import Path; ps = load_profiles(Path('settings')); assert ps, 'no profiles loaded'; [print(f'  OK  {p.source_file}') for p in ps]"

      - name: Run pytest
        run: pytest -v
