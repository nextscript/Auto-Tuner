display_name: "Gemma 4 (Google)"
patterns:
  - gemma-4
  - gemma4

# E2B/E4B unterstützen 131072 (128k); 26B-A4B und 31B bis 262144 (256k).
# Wird automatisch via GGUF-Metadata (native_context) je nach Modell
# heruntergeregelt - daher hier den größten Wert eintragen.
max_context: 262144
recommended_kv_quant: q8_0

# RoPE-Scaling (YaRN): Optional aktivierbar wenn genügend Speicher frei ist
# und der berechnete Context das native Limit überschreitet.
rope_scale:
  enabled: false        # Standard aus — User kann in GUI aktivieren
  max_context: 524288   # 0.5M tokens mit YaRN möglich
  scale_factor: 4.0     # yarn scaling factor (4x für Gemma-4-E2B/E4B, 2x für 26B-A4B/31B)

# Performance-Target-Empfehlung des Profils.
# Gemma-4-26B-A4B ist ein MoE-Modell (4B aktiv von 26B total), das auf
# 16-GB-GPUs nicht voll in VRAM passt. Gleiche Logik wie bei Qwen3.6-A3B:
# "throughput" reserviert nur 32k KV-Budget statt 64k, sodass mehr
# VRAM für Expert-Layer übrig bleibt. Wer regelmäßig >32k Kontext
# braucht, in der GUI auf "balanced" oder "safe" wechseln — die
# GUI-Wahl gewinnt immer gegen diese Empfehlung.
# Für die Dense-Varianten (E2B/E4B/31B) ist das Target relativ
# folgenlos, weil sie eh komplett in VRAM passen.
performance_target: throughput

# Sampling-Profile pro Modus.
sampling:
  chat:
    # Google's offizielle Empfehlung über alle Größen hinweg.
    temperature: 1.0
    top_k: 64
    top_p: 0.95
    min_p: 0.0
    repeat_penalty: 1.0   # Gemma reagiert schlecht auf >1.0
  coding:
    # Community-Tests zeigen, dass Gemma 4 für Coding mit höherer
    # Temperatur besser performt — gegen den Standard-Reflex
    # "deterministisch = 0.2" hier explizit höher.
    temperature: 1.5
    top_k: 64
    top_p: 0.95
    min_p: 0.0
    repeat_penalty: 1.0

# MTP / speculative decoding configuration.
# draft_max = max draft tokens per step.
#   2 ist der Sweet-Spot für Vulkan/ROCm auf Consumer-GPUs: Token 1 hat
#   ~85–90% Acceptance wenn p_min=0.75 greift; Token 3 würde nur ~61%
#   (0.85^3) bringen und der Extra-Overhead auf Vulkan lohnt sich nicht.
#   Auf CUDA/high-end Hardware kann 3 minimal besser sein — dann via
#   Expert-Panel überschreiben.
# draft_p_min = minimum confidence threshold for speculation.
#   0.75 = mainline default (b9190+). NICHT 0.0 setzen: das erzwingt
#   Spekulation bei jedem Schritt unabhängig von Confidence → konstanter
#   D2H-Transfer-Overhead auf Vulkan → schlechter als ohne Spekulation.
draft_max: 2
draft_p_min: 0.75

notes: >
  Gemma ist empfindlich gegenüber repeat_penalty > 1.0.
  E2B/E4B = multimodal (Text+Bild+Audio), 26B-A4B + 31B = Text+Bild.
  Thinking-Modus aktivierbar durch <|think|> am Anfang des System-Prompts.
  Coding-Profil nutzt temp=1.5 (vs. 1.0 chat) entsprechend Community-Tests
  die zeigen, dass Gemma 4 für Coding mit höherer Temperatur kreativere
  und korrektere Lösungen liefert — bei Bedarf mit `-- --temp 1.0`
  überschreiben falls die höhere Temperatur in deinem Workflow stört.