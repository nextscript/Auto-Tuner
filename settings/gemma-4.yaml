display_name: "Gemma 4 (Google)"
patterns:
  - gemma-4
  - gemma4

# E2B/E4B unterstützen 131072 (128k); 12B, 26B-A4B und 31B bis 262144 (256k).
# Wird automatisch via GGUF-Metadata (native_context) je nach Modell
# heruntergeregelt - daher hier den größten Wert eintragen.
max_context: 262144
recommended_kv_quant: q8_0

# RoPE-Scaling (YaRN): Optional aktivierbar wenn genügend Speicher frei ist
# und der berechnete Context das native Limit überschreitet.
# HINWEIS: greift bei Gemma 4 nur über diese rope_scale.enabled-Flagge, NICHT
# automatisch — die Arch "gemma4" steht (korrekt) nicht in scanner.py's
# _ROPE_SCALE_SUPPORTED_ARCHS, weil 256k nativ für normale Nutzung reicht.
rope_scale:
  enabled: false        # Standard aus — User kann in GUI aktivieren
  max_context: 524288   # 0.5M tokens mit YaRN möglich
  scale_factor: 4.0     # yarn scaling factor (4x für Gemma-4-E2B/E4B, 2x für 12B/26B-A4B/31B)

# Performance-Target-Empfehlung des Profils.
# Gemma-4-26B-A4B ist ein MoE-Modell (4B aktiv von 26B total), das auf
# 16-GB-GPUs nicht voll in VRAM passt. Gleiche Logik wie bei Qwen3.6-A3B:
# "throughput" reserviert nur 32k KV-Budget statt 64k, sodass mehr
# VRAM für Expert-Layer übrig bleibt. Wer regelmäßig >32k Kontext
# braucht, in der GUI auf "balanced" oder "safe" wechseln — die
# GUI-Wahl gewinnt immer gegen diese Empfehlung.
# Für die Dense-Varianten (E2B/E4B/12B/31B) ist das Target weitgehend
# folgenlos, SOLANGE das Modell komplett in VRAM passt: das 12B (dense,
# ~14 GB @ Q8) passt auf der 32-GB-R9700 mit vollem KV locker. NUR auf
# einer 16-GB-Karte würde der 32k-KV-Cap das dense 12B unnötig
# beschränken — dort dann in der GUI auf "balanced"/"safe" stellen.
performance_target: throughput

# Sampling-Profile pro Modus.
sampling:
  chat:
    # Google's offizielle Empfehlung über alle Größen hinweg.
    temperature: 1.0
    top_k: 64
    top_p: 0.95
    min_p: 0.0
    repeat_penalty: 1.0   # Gemma reagiert schlecht auf >1.0
  coding:
    # Community-Tests zeigen, dass Gemma 4 für Coding mit höherer
    # Temperatur besser performt — gegen den Standard-Reflex
    # "deterministisch = 0.2" hier explizit höher.
    temperature: 1.5
    top_k: 64
    top_p: 0.95
    min_p: 0.0
    repeat_penalty: 1.0

# MTP / speculative decoding configuration.
# draft_max = max draft tokens per step.
#   2 ist der Sweet-Spot für Vulkan/ROCm auf Consumer-GPUs: Token 1 hat
#   ~85–90% Acceptance wenn p_min=0.75 greift; Token 3 würde nur ~61%
#   (0.85^3) bringen und der Extra-Overhead auf Vulkan lohnt sich nicht.
#   Auf CUDA/high-end Hardware kann 3 minimal besser sein — dann via
#   Expert-Panel überschreiben.
# draft_p_min = minimum confidence threshold for speculation.
#   0.75 = mainline default (b9190+). NICHT 0.0 setzen: das erzwingt
#   Spekulation bei jedem Schritt unabhängig von Confidence → konstanter
#   D2H-Transfer-Overhead auf Vulkan → schlechter als ohne Spekulation.
draft_max: 2
draft_p_min: 0.75

# Sampler-Reihenfolge explizit setzen. Bei Gemma 4 zählt die Reihenfolge
# der Sampler-Anwendung — die Community-Empfehlung (Unsloth-GGUF-Doc /
# HF-Diskussion zu gemma-4-26B-A4B/31B) ist ausdrücklich:
#   --samplers "temperature;top_p;top_k"
# statt llama-servers Default-Chain
# (penalties;dry;top_n_sigma;top_k;typ_p;top_p;min_p;xtc;temperature).
# Wirkung:
#   * Nur temperature/top_p/top_k laufen — exakt die drei Sampler, für die
#     dieses Profil Werte vorgibt. Die im Tuner ohnehin als No-Op gesetzten
#     min_p (0.0) und repeat_penalty (1.0) werden aus der aktiven Chain
#     entfernt; ebenso die Default-Stages penalties/dry/top_n_sigma/xtc, die
#     Gemma nicht will und die u.a. mit dem hohen Coding-temp=1.5
#     interferieren würden.
#   * Die vom Tuner emittierten --temp/--top-p/--top-k binden weiterhin an
#     ihre Sampler in dieser Chain — nur min_p/repeat_penalty laufen leer,
#     was bei Gemma korrekt ist (beide sind hier bewusst deaktiviert).
# Hinweis: --samplers nimmt die Kette als EINEN Token, durch ';' getrennt;
# als argv also zwei Listen-Einträge (kein Shell-Quoting nötig).
extra_args:
  - --samplers
  - temperature;top_p;top_k

notes: >
  Gemma ist empfindlich gegenüber repeat_penalty > 1.0.
  Multimodalität nach Größe: E2B/E4B = Text+Bild+Audio, 12B = Text+Bild+Audio
  (NEU, "Unified"-Variante: encoder-free, Vision/Audio über direkte
  Linear-Projektionen statt separater Encoder), 26B-A4B + 31B = Text+Bild.
  Kontext: E2B/E4B = 128k, 12B/26B-A4B/31B = 256k.
  Arch-Hinweis: das 12B-Sprachmodell-GGUF lädt unter general.architecture
  "gemma4" (identisch zur restlichen Familie); die Strings gemma4uv/gemma4ua
  sind nur Projector-Typen auf der separaten mmproj-Datei. Scanner, KV-Logik
  und match_profile behandeln das 12B daher wie jedes andere Gemma-4-Modell.
  Thinking-Modus aktivierbar durch <|think|> am Anfang des System-Prompts.
  Coding-Profil nutzt temp=1.5 (vs. 1.0 chat) entsprechend Community-Tests
  die zeigen, dass Gemma 4 für Coding mit höherer Temperatur kreativere
  und korrektere Lösungen liefert — bei Bedarf mit `-- --temp 1.0`
  überschreiben falls die höhere Temperatur in deinem Workflow stört.
  Sampler-Reihenfolge wird über extra_args explizit als
  "temperature;top_p;top_k" gesetzt (Gemma-4-Empfehlung; siehe Kommentar
  oben) — wichtig, weil die Default-Sampler-Chain die hohe Coding-Temp
  sonst verfälscht.