display_name: "Qwen3.5 / Qwen3.6 (Alibaba)"
patterns:
  - qwen3.5
  - qwen3.6

# Qwen3.5 (Feb 2026): 0.8B/2B/4B/9B/27B/35B-A3B/122B-A10B/397B-A17B.
# Qwen3.6 (April 2026): erste Open-Weights 27B + 35B-A3B.
# Native 262144 (256k), erweiterbar via YaRN bis ~1.01M Tokens.
# HF-Card Qwen3.6: "Context Length: 262,144 natively and extensible up
# to 1,010,000 tokens" - daher hier den größten nativen Wert.
max_context: 262144
# KV-Quant-Empfehlung: q5_0 (asymmetrisch mit cv=q4_0 wenn der Tuner Platz
# sucht) ist für die A3B/A10B/A17B-MoE-Varianten der Sweet-Spot. Q8_0 wäre
# qualitativ marginal besser, kostet aber +37% KV-VRAM gegenüber q5_0
# (Faktoren 0.55 vs 0.40 von f16) — auf 16-GB-Klassen-GPUs landet damit
# ein Expert-Layer extra auf der CPU statt im VRAM, was die TG-Speed
# spürbar drückt. Wer für reine 27B-Dense-Sessions q8_0 will, kann es im
# Expert-Panel manuell pinnen — die Cascade rechnet den ctx dann
# automatisch entsprechend kleiner.
recommended_kv_quant: q5_0

# RoPE-Scaling (YaRN): Optional aktivierbar wenn genügend Speicher frei ist
# und der berechnete Context das native Limit überschreitet.
rope_scale:
  enabled: false        # Standard aus — User kann in GUI aktivieren
  max_context: 1010000  # ~1M tokens mit YaRN möglich (offiziell 1,010,000)
  scale_factor: 4.0     # YaRN scaling factor (4x für Qwen3.5/3.6)

# Performance-Target-Empfehlung des Profils.
# Qwen3.6-A3B ist ein MoE-Modell, das auf 16-GB-GPUs nicht voll in VRAM
# passt — der Trick ist, möglichst viele Expert-Layer auf der GPU zu
# halten und die nicht-aktiven Experten via --n-cpu-moe in den RAM
# auszulagern. "throughput" reserviert nur 32k KV-Budget statt 64k oder
# 128k, sodass mehr VRAM für Layer übrig bleibt. Wer regelmäßig >32k
# Kontext braucht, in der GUI auf "balanced" oder "safe" wechseln —
# die GUI-Wahl gewinnt immer gegen diese Empfehlung.
performance_target: throughput

# Sampling-Profile pro Modus.
sampling:
  chat:
    # Qwen3.5/3.6 Default ist Thinking-Modus. Werte sind die offiziellen
    # "Thinking general"-Settings aus den HF-Modell-Cards
    # (Bench-Setup für SWE-Bench: temp=1.0, top_p=0.95, top_k=20).
    temperature: 1.0
    top_k: 20
    top_p: 0.95
    min_p: 0.0
    repeat_penalty: 1.0     # Qwen empfiehlt explizit 1.0
    # Qwen empfiehlt presence_penalty: 1.5 *für Chat*. Beim Tool-Calling und
    # strukturierter Ausgabe ist das eine bekannte Loop-Quelle: das Modell
    # muss in jedem Tool-Call exakt dieselben Tokens emittieren (gleiche
    # JSON-Keys, gleiche Tool-Namen), und ein presence_penalty von 1.5
    # bestraft genau diese Wiederholungen → kaputtes JSON → Client meldet
    # Fehler → Modell "kreativiert" → Schleife.
    # Default daher konservativ auf 0.0. Wer reine Chat-Konversation ohne
    # Tools fährt und Wiederholungen sieht, kann beim Start überschreiben:
    #   -- --presence-penalty 1.5
    presence_penalty: 0.0
  coding:
    # Aus dem offiziellen QwenClawBench-Setup (HF-Card Qwen3.6-35B-A3B):
    # "QwenClawBench: temp=0.6, 256K ctx" - das ist der von Alibaba selbst
    # für agentische Coding-Tasks verwendete Wert.
    temperature: 0.6
    top_k: 20
    top_p: 0.95
    min_p: 0.0
    repeat_penalty: 1.0
    presence_penalty: 0.0

# MTP (Multi-Token Prediction) draft model configuration
# Qwen3.6-...-MTP uses integrated assistant models for speculative decoding via MTP.
# draft_max = number of MTP tokens to predict per step (default: 3)
# draft_p_min = minimum probability threshold for MTP speculation.
#   Mainline default (b9190+) is 0.75. Setting 0.0 forces speculation on every
#   step regardless of confidence → constant D2H-overhead → write slower than
#   baseline on Vulkan/ROCm. Keep 0.75 to match upstream: only speculate when
#   the draft head is reasonably confident. Community results on Qwen3.6-27B/35B
#   show ~75-95% acceptance anyway, so the threshold rarely fires and does not
#   hurt throughput. For pure coding sessions (repetitive token patterns) you
#   can lower to 0.5 for extra speculation aggressiveness: `-- --spec-draft-p-min 0.5`
draft_max: 3
draft_p_min: 0.75


notes: >
  Qwen3.5 (Feb 2026) und Qwen3.6 (April 2026) sind Thinking-by-default
  Multimodal-Modelle mit 256k nativem Kontext (erweiterbar bis 1.01M via
  YaRN). Original Qwen3 hat nur 32k - wird automatisch über
  GGUF-native_context begrenzt.
  Chat-Profil entspricht dem offiziellen Thinking-Setup; Coding-Profil
  spiegelt das offizielle QwenClawBench-Setting (temp=0.6) wider.
  presence_penalty steht hier auf 0.0 statt der offiziellen Qwen-Empfehlung
  von 1.5, weil 1.5 reproduzierbar Tool-Calling-Schleifen erzeugt
  (strukturierte Ausgabe braucht repeated tokens, die ein hohes
  presence_penalty bestraft). Für reinen Chat ohne Tools: `-- --presence-penalty 1.5`.
  Qwen3.6 Neu: `preserve_thinking` API-Flag hält Thinking-Content über
  Multi-Turn-Konversationen hinweg → bessere agentische Konsistenz.
  Tipp: `--jinja` als Extra-Arg beim Start aktiviert die saubere
  Trennung von <think>-Blöcken ins reasoning_content-API-Feld
  (statt sie inline im content zu lassen):
    -- --jinja