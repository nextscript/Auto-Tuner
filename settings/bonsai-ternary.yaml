display_name: "Ternary-Bonsai (PrismML, 1.58-bit)"
patterns:
  - ternary-bonsai

# Wie Bonsai 8B - 64k ist eine vernünftige Obergrenze.
max_context: 65536
recommended_kv_quant: q8_0

# Braucht ebenfalls den PrismML-Fork - Q2_0 Format packt die 1.58-bit
# Ternary-Gewichte hardware-freundlich in 2 bits. Der 2-bit/Ternary-Fork
# heisst 2b_ (Build: 2b_bXXXX_llama.cpp); 1b_ ist der 1-bit Bonsai-Fork.
server_binary: "2b_llama/llama-server"

# Sampling-Profile pro Modus.
# Gleiche Empfehlung wie Bonsai 8B (PrismML README-Beispiel).
sampling:
  chat:
    temperature: 0.5
    top_k: 20
    top_p: 0.85
    min_p: 0.05
    repeat_penalty: 1.05
  coding:
    # Wie bei 1-bit Bonsai: nur leicht abgesenkt, weil aggressive Quants
    # bei niedriger Temperatur zu Loops tendieren.
    temperature: 0.3
    top_k: 20
    top_p: 0.85
    min_p: 0.05
    repeat_penalty: 1.05

notes: >
  Ternary-Bonsai (8B/4B/1.7B) - Gewichte in {-1, 0, +1} (1.58 bits/weight).
  Zwischen 1-bit Bonsai und full-precision: ~9x kleiner, 5x schneller,
  besser auf Benchmarks als 1-bit Bonsai (avg +5 Punkte).
  Q2_0 ist die eingesetzte Speicher-Form (2-bit aligned für Metal/CUDA).
  Braucht den PrismML 2b_llama.cpp-Fork (Ternary-Kerne, 2-bit Q2_0).
